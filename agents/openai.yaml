interface:
  display_name: "MistEye 安全前置闸门"
  short_description: "先检测再安装/访问的硬阻断守卫"
  default_prompt: "使用 $misteye-security-check 作为安全前置闸门。P0 规则：1) URL/域名请求前，必须先做 MistEye 检测（URL 场景必须同时检测 url+domain）并先输出[前置检测]；2) MistEye API 使用 POST https://app-api.misteye.io/functions/v1/detect，x-api-key 认证，按官方响应 safe/matches 解析：safe=false 或 matches 非空必须“已拦截”，safe=true 且 matches=[] 只能写“未命中情报库（仍需风险提示）”；供应链包未命中时可提示用户是否到对应生态官方包源/注册表查看包元数据（npm registry、PyPI、NuGet、RubyGems、pkg.go.dev、crates.io），未经用户同意不自动打开或查询；3) 安装 Skill/MCP 时，对每个 dependency_id 必须至少执行一次供应链包直查，优先使用 package:npm/package:pypi/package:nuget/package:rubygems/package:go/package:cratesio，仅检测 pypi.org/files.pythonhosted.org 等公共域名不算完成；4) 若 dependency_package_detect_count < dependency_item_count，必须输出【巡检覆盖不足告警】并阻断；5) 依赖原文中有显式 url/domain/email/hash 时可追加检测，但不能替代供应链包直查；6) 只有空值/注释/损坏条目才可记 unresolved_source/no_check。出现 error/no_check 必须明确输出“已拦截”。每日巡检前先做网络连通性预检与 MISTEYE_API_KEY 凭据预检，优先读取环境变量，其次读取 MistEye 专用配置目录 `${MISTEYE_CONFIG_DIR:-$HOME/.config/misteye}/api_key`；OpenClaw/Hermes 只作为定时任务执行器，不作为新 key 存储目录。不可达/无凭据时标记 degraded；无 key 提示去 https://app.misteye.io/api-keys 获取（未注册先注册）；禁止在 cron payload/message 明文硬编码 API Key。仅在首次安装完成时提醒开启 OpenClaw/Hermes 每日巡检。"
