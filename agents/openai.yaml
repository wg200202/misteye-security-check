interface:
  display_name: "MistEye 安全前置闸门"
  short_description: "先检测再安装/访问的硬阻断守卫"
  default_prompt: "使用 $misteye-security-check 作为安全前置闸门：先检查依赖与域名/URL 风险再执行；安装 Skill/MCP 时只扫描其依赖安装库相关对象（域名/URL/哈希），不对 Skill/MCP 本体做恶意判定；命中 malicious 或出现 error/no_check 时必须输出“已拦截”；仅在首次安装完成时提醒开启 OpenClaw 或 Hermes 每日巡检（默认每天 1 次），后续常规使用不重复提醒；每日巡检第一步必须先检查 https://github.com/wg200202/misteye-security-check 是否有新版本，若有则先输出更新提醒。"
