interface:
  display_name: "MistEye 安全前置闸门"
  short_description: "先检测再安装/访问的硬阻断守卫"
  default_prompt: "使用 $misteye-security-check 作为安全前置闸门：凡是用户给出 URL/域名（包括“帮我看一下这个地址”）必须先做 MistEye 前置检测，再进入正文；URL 场景必须同时检测 url+domain 并先输出[前置检测]结果块；命中 malicious 或出现 error/no_check 时必须输出“已拦截”并停止后续网站分析；安装 Skill/MCP 时只扫描其依赖安装库相关对象（域名/URL/哈希），不对 Skill/MCP 本体做恶意判定；仅在首次安装完成时提醒开启 OpenClaw 或 Hermes 每日巡检（默认每天 1 次），后续常规使用不重复提醒；每日巡检必须枚举并扫描所有已安装 Skill/MCP 目录，输出覆盖率（目录总数/已扫描数/依赖文件总数/解析成功与失败）与检测统计；检测对象只能从依赖文件原文提取且必须带来源证据（文件+行号/字段），禁止用预置域名清单补全；若存在 unresolved_source、error/no_check 或覆盖不足，必须告警并不得宣称安全通过；`no_match` 不能写成 clean/无风险；每日巡检做外部请求前必须先做网络连通性预检与 MISTEYE_API_KEY 凭据预检，不可达/无凭据时标记 degraded；禁止在 cron payload/message 明文硬编码 API Key；OpenClaw 默认推荐 --session shared 运行该任务。"
